name: Validate Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'bicep/**'
      - '.github/workflows/**'
      - 'tests/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  DEV_RESOURCE_GROUP: rg-eft-dev

jobs:
  # ─── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Lint main.bicep
        run: az bicep lint --file bicep/main.bicep

      - name: Build Bicep to ARM JSON
        run: az bicep build --file bicep/main.bicep --outfile /tmp/main.json

      - name: Upload ARM template artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm-template
          path: /tmp/main.json
          retention-days: 3

  # ─── Job 2: Security Scan ───────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ARM template
        uses: actions/download-artifact@v4
        with:
          name: arm-template
          path: /tmp

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          file: /tmp/main.json
          framework: arm
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ─── Job 3: What-If Preview ─────────────────────────────────────────────────
  what-if:
    name: What-If Preview (Dev)
    runs-on: ubuntu-latest
    needs: lint
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure dev resource group exists
        run: |
          az group create \
            --name ${{ env.DEV_RESOURCE_GROUP }} \
            --location eastus \
            --tags environment=dev project=globalscape-eft managedBy=bicep

      - name: Validate Bicep deployment
        run: |
          az deployment group validate \
            --resource-group ${{ env.DEV_RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters bicep/parameters/dev.bicepparam \
            --parameters adminPassword="${{ secrets.EFT_ADMIN_PASSWORD }}"

      - name: Run What-If and save output
        run: |
          az deployment group what-if \
            --resource-group ${{ env.DEV_RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters bicep/parameters/dev.bicepparam \
            --parameters adminPassword="${{ secrets.EFT_ADMIN_PASSWORD }}" \
            --result-format FullResourcePayloads 2>&1 | tee /tmp/whatif-output.txt

      - name: Post What-If result as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/whatif-output.txt', 'utf8');
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n... (truncated)' : output;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Azure What-If Preview — Dev Environment\n\`\`\`\n${truncated}\n\`\`\``
            });
